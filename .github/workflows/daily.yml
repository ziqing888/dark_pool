name: FINRA Dark Pool Daily

on:
  schedule:
    - cron: '30 13 * * 1-5'  # 美东9:30，工作日
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - name: Fetch dark pool data
        run: python fetch_darkpool.py AAPL NVDA AVGO MRVL > result.json
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with: { name: darkpool, path: result.json }
